[tool.poetry]
name = "brgsentimentbot"
version = "0.3.0"
description = "Simplified news sentiment CLI"
packages = [{ include = "sentiment_bot" }]

[tool.poetry.dependencies]
python = ">=3.11,<3.13"
aiohttp = "^3.9.5"
feedparser = "^6.0.11"
vaderSentiment = "^3.3.2"
rich = "^13.0"

[tool.poetry.group.dev.dependencies]
pytest = "^8.1"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"


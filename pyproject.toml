[tool.poetry]
name = "brgsentimentbot"
version = "0.2.0"
description = "Async news sentiment/volatility CLI bot"
authors = ["BRG <dev@example.com>"]
packages = [{ include = "sentiment_bot" }]

[tool.poetry.dependencies]
python = "^3.11"
feedparser = "^6.0.11"
aiohttp = "^3.9.5"
newspaper3k = "^0.2.8"
rapidfuzz = "^3.6.1"
spacy = "^3.8.0"
transformers = "^4.41.2"
torch = {version = "^2.2.2", source = "pypi", markers="platform_machine!='arm64'"}
vaderSentiment = "^3.3.2"
typer = {extras = ["all"], version = "^0.12.3"}
rich = "^13.7.1"
sqlmodel = "^0.0.16"
aiosqlite = "^0.19.0"
newsapi-python = "^0.2.7"
langchain = "^0.2.1"
sentence-transformers = "^3.0.1"
faiss-cpu = "^1.8.0"
pyyaml = "^6.0.1"
websockets = "^12.0"
gradio = "^4.37.1"
numpy = "^1.26.4"
scipy = "^1.11.4"
pydantic-settings = "^2.3.1"
pandas = "^2.2.2"

[tool.poetry.dev-dependencies]
pytest = "^8.2.0"
ruff = "^0.4.8"
black = "^24.4.2"
mypy = "^1.8"
coverage = "^7.5"
respx = "^0.20.2"

[tool.poetry.scripts]
bot = "sentiment_bot.cli:app"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

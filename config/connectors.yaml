# Connector Configuration
# This file defines all available connectors for modern data ingestion

sources:
  # Reddit RSS Connector
  - type: reddit
    name: reddit
    enabled: true
    subreddits:
      - worldnews
      - news
      - economics
      - technology
      - politics
      - geopolitics
      - UkrainianConflict
      - europe
      - asia
      - africa
    max_items: 100

  # Google News RSS Connector  
  - type: google_news
    name: google_news
    enabled: true
    language: en
    country: US
    max_items: 100

  # Hacker News Connector
  - type: hackernews
    name: hackernews
    enabled: true
    categories:
      - top
      - new
      - best
    max_items: 100

  # Hacker News Search Connector
  - type: hackernews_search
    name: hackernews_search
    enabled: true
    max_items: 100

  # Stack Exchange Connector
  - type: stackexchange
    name: stackexchange
    enabled: true
    sites:
      - stackoverflow
      - politics
      - economics
      - worldbuilding
    max_items: 50

  # Mastodon Connector
  - type: mastodon
    name: mastodon
    enabled: true
    instances:
      - mastodon.social
      - mastodon.world
      - fosstodon.org
    max_items: 100

  # Bluesky Connector
  - type: bluesky
    name: bluesky
    enabled: true
    handle: "webscraper101"
    password: "tanki123"
    max_items: 100

  # YouTube Connector
  - type: youtube
    name: youtube
    enabled: true
    api_key: ""  # Optional - will use scraping if not provided
    max_items: 50

  # Wikipedia Connector
  - type: wikipedia
    name: wikipedia
    enabled: true
    languages:
      - en
      - es
      - fr
      - de
    max_items: 50

  # GDELT Connector
  - type: gdelt
    name: gdelt
    enabled: true
    countries:
      - US
      - UK
      - UA
      - RU
      - CN
    themes:
      - MILITARY
      - ECON
      - ENV
      - HEALTH
    max_items: 100

  # Generic Web Connector
  - type: generic_web
    name: generic_web
    enabled: true
    domains:
      - reuters.com
      - apnews.com
      - bbc.com
      - cnn.com
      - aljazeera.com
    max_items: 50

  # Twitter Snscrape Connector
  - type: twitter
    name: twitter
    enabled: true
    max_items: 100

# Global settings
settings:
  rate_limit_seconds: 1
  timeout_seconds: 30
  retry_attempts: 3
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
  cache_enabled: true
  cache_ttl_hours: 24
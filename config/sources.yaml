# Connector Configuration Example
# Copy this to sources.yaml and customize for your needs

sources:
  # Reddit RSS - No API key required
  - type: reddit
    subreddits:
      - worldnews
      - news
      - politics
      - technology
      - science
    sort: hot
    limit: 100
    
  # Google News RSS - No API key required
  - type: google_news
    queries:
      - "artificial intelligence"
      - "climate change"
      - "economic policy"
    editions:
      - "US"
      - "UK"
    max_per_query: 50
    
  # Hacker News - No API key required
  - type: hackernews
    categories:
      - top
      - new
      - best
    max_stories: 100
    fetch_comments: false
    
  # StackExchange - No API key required
  - type: stackexchange
    sites:
      - stackoverflow
      - serverfault
      - askubuntu
    tags:
      - python
      - machine-learning
      - docker
    max_questions: 50
    
  # Mastodon - Instance-based, no API key for public posts
  - type: mastodon
    instances:
      - mastodon.social
      - fosstodon.org
    hashtags:
      - technology
      - opensource
    local_only: false
    max_toots: 200
    
  # Bluesky - Requires account (free signup)
  - type: bluesky
    handle: "your.handle"
    password: "your_password"  # Or use environment variable
    queries:
      - "tech news"
      - "ai"
    max_posts: 100
    
  # YouTube RSS - No API key required for RSS
  - type: youtube
    channels:
      - "UCddiUEpeqJcYeBxX1IVBKvQ"  # The Verge
      - "UCBJycsmduvYEL83R_U4JriQ"  # MKBHD
    fetch_transcript: false  # Requires additional setup
    max_results: 50
    
  # Wikipedia - No API key required
  - type: wikipedia
    queries:
      - "artificial intelligence"
      - "quantum computing"
      - "renewable energy"
    lang: en
    max_per_query: 10
    
  # GDELT - No API key required
  - type: gdelt
    query: "artificial intelligence OR machine learning"
    max_items: 250
    mode: artlist
    
  # Generic Web Scraping - No API key required
  - type: generic_web
    sites_yaml: "config/sites.yaml"  # Define sites to scrape
    
  # Twitter/X via snscrape - No API key required
  - type: twitter
    queries:
      - "lang:en artificial intelligence"
      - "from:OpenAI"
      - "#MachineLearning"
    max_per_query: 200
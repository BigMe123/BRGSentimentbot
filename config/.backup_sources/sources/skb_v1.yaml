# Default quotas and limits
default_quotas:
  min_sources: 30
  max_top1_share: 0.30
  max_top3_share: 0.60
  min_fresh_fraction: 0.60
  target_words: 200000
  min_editorial_families: 3
  min_languages: 1  # 2 for multilingual regions

# Discovery settings
discovery:
  enabled: true
  budget_fraction: 0.10  # 10% of time budget
  max_domains_per_run: 5
  max_pages_per_domain: 10
  staging_promotion_threshold: 3  # successful runs before auto-promotion
  respect_robots: true

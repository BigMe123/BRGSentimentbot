# Connector Configuration Example - Enhanced with Keyword Fan-out
# Copy this to sources.yaml and customize for your needs
#
# New Features:
# - Keyword fan-out: Each query/hashtag/search term gets separate requests
# - Enhanced pagination: Better limit handling per source
# - Rate limiting: Configurable delays between requests
# - Post-fetch filtering: Defensive keyword matching
#
# Usage Examples:
#   bsgbot connectors --keywords "crypto,blockchain,bitcoin" --limit 400 --since 7d
#   bsgbot connectors --type google_news --keywords "ethereum" --analyze

sources:
  # Reddit RSS with Search Mode (Keyword Fan-out)
  - type: reddit
    # NEW: Use queries for keyword fan-out (recommended)
    queries:
      - "cryptocurrency"
      - "blockchain"
      - "bitcoin"
      - "ethereum"
    # OR use traditional subreddit mode
    # subreddits:
    #   - worldnews
    #   - CryptoCurrency
    #   - bitcoin
    sort: new  # new, hot, top, rising
    time: week  # hour, day, week, month (for search mode)
    limit_per_sub: 200  # Enhanced: per-query limit
    delay_ms: 300  # NEW: Rate limiting between requests
    
  # Google News RSS with Edition Fan-out
  - type: google_news
    # NEW: Keyword fan-out across multiple editions
    queries:
      - "(crypto OR blockchain OR bitcoin OR ethereum)"
      - "defi"
      - "web3"
    editions:
      - "en-US"  # Enhanced: Full locale codes
      - "en-GB"
      - "en-CA"
      - "en-AU"
    per_query_cap: 200  # Enhanced: per-query per-edition limit
    delay_ms: 300  # NEW: Rate limiting between requests
    
  # Hacker News with Category Fan-out
  - type: hackernews
    categories:
      - top
      - new
      - best
    max_stories: 100
    fetch_comments: false
    
  # NEW: Hacker News Search via Algolia API
  - type: hackernews_search
    queries:
      - "cryptocurrency"
      - "blockchain"
      - "bitcoin"
      - "ethereum"
    hits_per_page: 100  # NEW: Results per page
    pages: 3  # NEW: Pages to fetch per query
    tags: "story"  # story, comment, poll, job
    delay_ms: 100  # NEW: Rate limiting
    
  # StackExchange with Search Fan-out
  - type: stackexchange
    sites:
      - stackoverflow
      - bitcoin  # NEW: Bitcoin StackExchange
      - ethereum  # NEW: Ethereum StackExchange
    # NEW: Use queries for keyword fan-out search (recommended)
    queries:
      - "blockchain"
      - "cryptocurrency"
      - "smart contracts"
    # OR use traditional tag mode
    # tagged:
    #   - python
    #   - blockchain
    pages: 3  # Enhanced: Pages per site/query
    pagesize: 50  # Enhanced: Items per page
    delay_ms: 200  # NEW: Rate limiting
    
  # Mastodon with Hashtag Fan-out
  - type: mastodon
    instance: mastodon.social  # Enhanced: Single instance focus
    # NEW: Hashtag fan-out - one request per hashtag
    hashtags:
      - "crypto"
      - "blockchain"
      - "bitcoin"
      - "ethereum"
    limit_per_tag: 100  # Enhanced: per-hashtag limit
    local: false  # Enhanced: local instance posts only
    delay_ms: 500  # NEW: Rate limiting between hashtags
    
  # Bluesky with Query Fan-out (No account needed for public API)
  - type: bluesky
    # NEW: No authentication needed for public search
    queries:
      - "crypto"
      - "blockchain"
      - "bitcoin"
      - "ethereum"
    limit_per_query: 100  # Enhanced: per-query limit
    delay_ms: 1000  # NEW: Rate limiting (Bluesky is stricter)
    
  # YouTube RSS with Channel Fan-out
  - type: youtube
    # NEW: Channel fan-out - one request per channel
    channels:
      - "UCrYxSrpsJkqUxHbFHfWuNLq"  # Coin Bureau
      - "UCJWCJCWOxBYSi5DhCieLOLQ"  # Coin Telegraph
      - "UC0zV0eVbqA2QorZO32FqPFg"  # Altcoin Daily
    # search_queries:
    #   - "cryptocurrency news"
    #   - "bitcoin analysis"
    fetch_transcript: false  # Experimental feature
    max_per_channel: 50  # Enhanced: per-channel limit
    delay_ms: 500  # NEW: Rate limiting between channels
    
  # Wikipedia with Query Fan-out
  - type: wikipedia
    # NEW: Keyword fan-out search
    queries:
      - "cryptocurrency"
      - "blockchain"
      - "bitcoin"
      - "ethereum"
    max_per_query: 10  # Enhanced: per-query limit
    lang: en  # Language code
    delay_ms: 200  # NEW: Rate limiting between queries
    
  # GDELT with Query Fan-out
  - type: gdelt
    # NEW: Multiple queries for fan-out
    queries:
      - "cryptocurrency"
      - "blockchain"
      - "bitcoin"
      - ""  # Empty query = latest articles
    max_per_query: 250  # Enhanced: per-query limit
    mode: artlist  # artlist or timeline
    delay_ms: 500  # NEW: Rate limiting between queries
    
  # Generic Web Scraping - No API key required
  - type: generic_web
    sites_yaml: "config/sites.yaml"  # Define sites to scrape
    
  # Twitter/X via snscrape with Query Fan-out
  - type: twitter
    # NEW: Enhanced query fan-out with availability checking
    queries:
      - '"crypto" OR "blockchain" OR "bitcoin" OR "ethereum" since:2025-08-20'
      - '"defi" lang:en'
      - '"web3" lang:en'
      - 'from:VitalikButerin OR from:elonmusk crypto'
    max_per_query: 400  # Enhanced: per-query limit
    delay_ms: 0  # NEW: Usually no delay needed for snscrape
    # NOTE: Automatically checks if snscrape is installed
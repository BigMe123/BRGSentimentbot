apiVersion: apps/v1
kind: Deployment
metadata:
  name: analyzer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analyzer
  template:
    metadata:
      labels:
        app: analyzer
    spec:
      containers:
        - name: analyzer
          image: analyzer:latest
          command: ["bot", "once"]
---
apiVersion: v1
kind: Service
metadata:
  name: analyzer
spec:
  selector:
    app: analyzer
  ports:
    - port: 80
      targetPort: 80

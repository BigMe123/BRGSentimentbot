apiVersion: apps/v1
kind: Deployment
metadata:
  name: forecast
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forecast
  template:
    metadata:
      labels:
        app: forecast
    spec:
      containers:
        - name: forecast
          image: forecast:latest
          command: ["bot", "forecast"]
---
apiVersion: v1
kind: Service
metadata:
  name: forecast
spec:
  selector:
    app: forecast
  ports:
    - port: 80
      targetPort: 80
